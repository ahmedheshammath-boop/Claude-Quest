<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude AI Quest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --board:#1E2A24; --board-2:#24352C; --board-3:#2B3E33;
    --chalk:#F4EFE1; --chalk-dim:#C9C3AE;
    --marker:#FFC857; --red:#E4572E; --teal:#4FA8A0; --purple:#9B8AE6;
    --claude:#D97757;
    --line:rgba(244,239,225,0.14);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;height:100dvh;background:var(--board); overscroll-behavior:none;}
  body{
    font-family:'Inter',sans-serif; color:var(--chalk); overflow:hidden;
  }
  .display{font-family:'Kalam',cursive;}
  .mono{font-family:'JetBrains Mono',monospace;}

  #bgPhotos{position:fixed; inset:0; z-index:0; overflow:hidden; background:var(--board);}
  .bg-photo{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:0; filter:saturate(0.85) brightness(0.8);
    animation:bgcycle 48s infinite; animation-fill-mode:both;}
  @keyframes bgcycle{
    0%{opacity:0; transform:scale(1);}
    2%{opacity:1;}
    15%{opacity:1; transform:scale(1.07);}
    17%{opacity:0; transform:scale(1.07);}
    100%{opacity:0; transform:scale(1.07);}
  }
  #bgOverlay{position:fixed; inset:0; z-index:1;
    background:
      linear-gradient(180deg, rgba(30,42,36,0.90), rgba(30,42,36,0.93)),
      radial-gradient(ellipse at 20% 10%, rgba(255,255,255,0.035), transparent 40%),
      radial-gradient(ellipse at 90% 80%, rgba(255,255,255,0.03), transparent 45%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px);
  }
  @media (prefers-reduced-motion: reduce){
    .bg-photo{animation:none !important; transform:none !important;}
    .bg-photo:first-child{opacity:0.25 !important;}
  }

  #deck{position:relative; z-index:2; width:100vw; height:100vh; height:100dvh; overflow-y:auto;}
  .slide{
    position:absolute; inset:0; overflow-y:auto;
    display:flex; flex-direction:column; align-items:center;
    padding:5vh 7vw 8vh;
    opacity:0; transform:translateY(24px) scale(.985); pointer-events:none;
    transition:opacity .5s ease, transform .5s ease;
  }
  .slide.active{opacity:1; transform:translateY(0) scale(1); pointer-events:auto;}

  .eyebrow{font-family:'JetBrains Mono',monospace; letter-spacing:.16em; text-transform:uppercase; font-size:.72rem; color:var(--marker); margin-bottom:12px; opacity:.9;}
  h1.title{font-size:clamp(2.2rem,5vw,3.8rem); margin:8px 0 10px; line-height:1.05; text-align:center;}
  h2.slide-h{font-size:clamp(1.6rem,3.2vw,2.5rem); margin:0 0 6px; text-align:center;}
  .sub{color:var(--chalk-dim); font-size:1rem; max-width:680px; text-align:center; margin:0 auto 22px; line-height:1.55;}
  .content{width:100%; max-width:900px; display:flex; flex-direction:column; align-items:center; gap:18px; margin:0 auto;}

  .navbar{position:fixed; top:0; left:0; right:0; height:52px; display:flex; align-items:center; justify-content:space-between; padding:0 20px; z-index:70; pointer-events:none;}
  .navbar > *{pointer-events:auto;}
  .brand{font-family:'JetBrains Mono',monospace; font-size:.72rem; color:var(--chalk-dim); letter-spacing:.1em;}
  .dots{display:flex; gap:6px;}
  .dot{width:7px;height:7px;border-radius:50%; background:rgba(244,239,225,.25); cursor:pointer; transition:.25s;}
  .dot.active{background:var(--marker); width:20px; border-radius:5px;}
  .arrows{position:fixed; bottom:20px; right:24px; display:flex; gap:10px; z-index:70;}
  .navbtn{background:var(--board-2); border:1px solid var(--line); color:var(--chalk); width:44px;height:44px;border-radius:50%; font-size:1.1rem; cursor:pointer; display:flex;align-items:center;justify-content:center; transition:.2s;}
  .navbtn:hover{background:var(--marker); color:#1E2A24;}
  .hint{position:fixed; bottom:28px; left:24px; font-size:.72rem; color:var(--chalk-dim); font-family:'JetBrains Mono',monospace; z-index:70;}

  .btn{border:none; cursor:pointer; font-family:'Inter',sans-serif; font-weight:700; padding:11px 20px; border-radius:10px; font-size:.9rem; transition:.15s; touch-action:manipulation; -webkit-user-select:none; user-select:none;}
  .btn-primary{background:var(--marker); color:#22301F;}
  .btn-primary:hover{transform:translateY(-2px); box-shadow:0 8px 20px rgba(255,200,87,.25);}
  .btn-primary:disabled{opacity:.4; cursor:not-allowed; transform:none; box-shadow:none;}
  .btn-ghost{background:transparent; color:var(--chalk); border:1px solid var(--line);}
  .btn-ghost:hover{border-color:var(--marker); color:var(--marker);}
  .btn-row{display:flex; gap:10px; flex-wrap:wrap; justify-content:center;}

  .card{background:var(--board-2); border:1px solid var(--line); border-radius:16px; padding:20px 24px; width:100%;}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:16px; width:100%;}
  @media(max-width:820px){.grid2{grid-template-columns:1fr;}}

  .codeblock{background:#14201A; border:1px solid var(--line); border-radius:12px; padding:15px 17px; font-family:'JetBrains Mono',monospace; font-size:.82rem; color:#B9E4C9; white-space:pre-wrap; line-height:1.55; text-align:left;}
  .tag{display:inline-block; font-family:'JetBrains Mono',monospace; font-size:.66rem; letter-spacing:.07em; text-transform:uppercase; padding:3px 9px; border-radius:20px; border:1px solid var(--line); color:var(--chalk-dim);}
  .roster-chip{padding:10px 16px; border-radius:10px; border:1px solid var(--line); background:var(--board-3); cursor:pointer; font-weight:700; transition:.15s; font-size:.9rem; touch-action:manipulation; -webkit-user-select:none; user-select:none;}
  .roster-chip:hover{border-color:var(--marker);}
  .roster-chip.here{background:var(--marker); color:#22301F; border-color:var(--marker);}

  #leaderboard{position:fixed; top:60px; right:16px; z-index:60; background:rgba(30,42,36,0.92); border:1px solid var(--line); border-radius:14px; padding:12px 14px; min-width:190px; -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px); box-shadow:0 10px 30px rgba(0,0,0,.35);}
  #leaderboard h3{margin:0 0 8px; font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; color:var(--marker); font-family:'JetBrains Mono',monospace;}
  .lb-row{display:flex; align-items:center; justify-content:space-between; gap:10px; padding:3px 0; font-size:.85rem;}
  .lb-swatch{width:8px;height:8px;border-radius:50%; display:inline-block; margin-right:5px;}
  .lb-toggle{position:fixed; top:12px; right:16px; z-index:61; background:none;border:none;color:var(--chalk-dim); cursor:pointer; font-size:.7rem; font-family:'JetBrains Mono',monospace;}

  .award-panel{width:100%;}
  .award-panel h4{text-align:center; font-size:.78rem; letter-spacing:.1em; text-transform:uppercase; color:var(--chalk-dim); margin:0 0 10px; font-family:'JetBrains Mono',monospace;}
  .award-grid{display:flex; gap:10px; flex-wrap:wrap; justify-content:center;}
  .award-btn{display:flex; flex-direction:column; align-items:center; gap:6px; background:var(--board-2); border:1px solid var(--line); border-radius:12px; padding:9px 14px; min-width:100px;}
  .award-btn input{width:100%; background:transparent; border:none; color:var(--chalk); font-weight:700; text-align:center; font-family:'Inter'; font-size:.85rem; outline:none;}
  .plus-row{display:flex; gap:5px;}
  .plus{background:rgba(255,200,87,.12); color:var(--marker); border:1px solid rgba(255,200,87,.3); border-radius:8px; padding:4px 8px; font-size:.7rem; font-weight:700; cursor:pointer;}
  .plus:hover{background:var(--marker); color:#22301F;}

  .timer-wrap{display:flex; flex-direction:column; align-items:center; gap:8px;}
  .timer-display{font-family:'JetBrains Mono',monospace; font-size:2.6rem; font-weight:700; color:var(--marker);}
  .timer-display.done{color:var(--red);}

  .reveal-box{cursor:pointer; text-align:center;}
  .reveal-panel{max-height:0; overflow:hidden; transition:max-height .5s ease;}
  .reveal-panel.open{max-height:400px;}
  .quiz-opt{display:block; width:100%; text-align:left; background:var(--board-3); border:1px solid var(--line); color:var(--chalk); padding:11px 14px; border-radius:10px; margin-bottom:8px; cursor:pointer; font-size:.9rem; transition:.15s; touch-action:manipulation; -webkit-user-select:none; user-select:none;}
  .quiz-opt:hover{border-color:var(--teal);}
  .quiz-opt.correct{background:rgba(79,168,160,.18); border-color:var(--teal);}
  .quiz-opt.wrong{background:rgba(228,87,46,.15); border-color:var(--red); opacity:.7;}

  /* game arena */
  .game-arena{position:relative; width:100%; height:340px; background:#14201A; border:1px solid var(--line); border-radius:16px; overflow:hidden;}
  .game-icon{position:absolute; width:58px; height:58px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; user-select:none; -webkit-user-select:none; touch-action:manipulation; box-shadow:0 4px 14px rgba(0,0,0,.4); transition:transform .1s;}
  .game-icon:active{transform:scale(0.85);}
  .game-icon.claude{background:var(--claude); font-size:1.6rem;}
  .game-icon.d1{background:#3B6E91; font-size:1.5rem;}
  .game-icon.d2{background:#5B4E8C; font-size:1.5rem;}
  .game-icon.d3{background:#4E6B57; font-size:1.5rem;}
  .game-score-big{font-family:'JetBrains Mono',monospace; font-size:2.2rem; font-weight:700; color:var(--marker); text-align:center;}
  .flash{position:absolute; font-family:'JetBrains Mono',monospace; font-weight:700; font-size:1.1rem; pointer-events:none; animation:floatUp .6s ease forwards;}
  @keyframes floatUp{from{opacity:1; transform:translateY(0);} to{opacity:0; transform:translateY(-40px);}}

  /* sandboxes */
  textarea, input[type=text], select{width:100%; background:var(--board-3); border:1px solid var(--line); border-radius:10px; color:var(--chalk); padding:11px 13px; font-family:'Inter',sans-serif; font-size:16px; outline:none;}
  select{-webkit-appearance:none; appearance:none; cursor:pointer; background-image:linear-gradient(45deg,transparent 50%,var(--chalk-dim) 50%),linear-gradient(135deg,var(--chalk-dim) 50%,transparent 50%); background-position:calc(100% - 20px) center, calc(100% - 15px) center; background-size:5px 5px,5px 5px; background-repeat:no-repeat; padding-right:34px;}
  select option{background:var(--board-3); color:var(--chalk);}
  textarea{min-height:100px; resize:vertical; line-height:1.5; font-family:'JetBrains Mono',monospace; font-size:16px;}
  textarea:focus, input[type=text]:focus, select:focus{border-color:var(--marker);}
  label.field-label{display:block; font-size:.74rem; letter-spacing:.06em; text-transform:uppercase; color:var(--chalk-dim); margin-bottom:6px; font-family:'JetBrains Mono',monospace;}
  .output-box{margin-top:14px; background:#14201A; border:1px solid var(--line); border-radius:12px; padding:15px 17px; font-family:'JetBrains Mono',monospace; font-size:.8rem; color:#DDE8DA; white-space:pre-wrap; line-height:1.5; max-height:340px; overflow-y:auto; display:none;}
  .output-box.show{display:block;}
  .spinner{display:inline-block; width:13px;height:13px;border:2px solid rgba(244,239,225,.25); border-top-color:var(--marker); border-radius:50%; animation:spin .7s linear infinite; margin-right:8px; vertical-align:-2px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .err-box{margin-top:10px; padding:9px 13px; border-radius:10px; background:rgba(228,87,46,.12); border:1px solid rgba(228,87,46,.35); color:#F2B8A5; font-size:.82rem; display:none;}
  .err-box.show{display:block;}
  .copy-btn{margin-top:8px;}

  #confetti-canvas{position:fixed; inset:0; pointer-events:none; z-index:100;}
  .toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--board-2); border:1px solid var(--marker); color:var(--chalk); padding:11px 18px; border-radius:12px; font-size:.85rem; z-index:200; opacity:0; transition:opacity .3s ease, transform .3s ease; max-width:80vw; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,.4);}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  ::selection{background:var(--marker); color:#22301F;}

  /* ============ RESPONSIVE: PHONES & SMALL TABLETS ============ */
  @media (max-width: 700px){
    .navbar{padding:0 10px; height:46px;}
    .navbar .brand:first-child{display:none;} /* hide long "ATS/UAQ" label, keep dots + counter */
    .dots{gap:4px;}
    .dot{width:6px; height:6px;}
    .dot.active{width:16px;}
    #slideCounter{font-size:.62rem;}
    .hint{display:none;} /* keyboard arrow hint is meaningless on touch */
    .arrows{bottom:14px; right:14px; gap:8px;}
    .navbtn{width:40px; height:40px; font-size:1rem;}
    #leaderboard{top:52px; right:8px; min-width:150px; padding:9px 11px; max-height:46vh; overflow-y:auto;}
    #leaderboard h3{font-size:.66rem;}
    .lb-row{font-size:.78rem;}
    .lb-toggle{top:8px; right:8px; font-size:.62rem;}
    .slide{padding:4.5vh 5vw 12vh;}
    h1.title{font-size:1.9rem;}
    h2.slide-h{font-size:1.4rem;}
    .sub{font-size:.9rem;}
    .card{padding:16px 16px;}
    .game-arena{height:230px;}
    .game-icon{width:50px; height:50px; font-size:1.3rem !important;}
    .game-score-big{font-size:1.7rem;}
    .timer-display{font-size:2.1rem;}
    .award-grid{gap:7px;}
    .award-btn{min-width:84px; padding:7px 10px;}
    .plus{padding:7px 10px; font-size:.72rem;}
  }
  @media (max-width: 400px){
    #leaderboard{min-width:130px;}
    .award-btn{min-width:74px;}
  }
  /* Ensure inputs never trigger iOS zoom regardless of breakpoint */
  @media (max-width: 700px){
    textarea, input[type=text], select{font-size:16px;}
  }
</style>
</head>

<script>
/* ============================================================
   FIREBASE REALTIME DATABASE — plain REST, no SDK needed
   Paste your Firebase Realtime Database URL below (looks like
   https://your-project-default-rtdb.firebaseio.com or
   https://your-project-default-rtdb.<region>.firebasedatabase.app )
   ============================================================ */
const FIREBASE_DB_URL = 'https://claude-pd-default-rtdb.firebaseio.com';

async function fbGet(key){
  const res = await fetch(`${FIREBASE_DB_URL}/${key}.json`);
  if(!res.ok) throw new Error('Firebase GET failed: ' + res.status);
  return await res.json(); // null if the key has never been set
}
async function fbSet(key, value){
  const res = await fetch(`${FIREBASE_DB_URL}/${key}.json`, {
    method:'PUT',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(value)
  });
  if(!res.ok) throw new Error('Firebase PUT failed: ' + res.status);
}

/* ============ PLAYER STATE (fixed roster, persisted + shared live) ============ */
const rosterColors = ['#FFC857','#4FA8A0','#E4572E','#9B8AE6','#5FB0D9','#E68FB3','#8FD19E','#D9A05F','#B08FE6','#6FBF9E'];
let teams = [
  {name:'Ahmed',score:0},{name:'Serge',score:0},{name:'Eman',score:0},{name:'Magdi',score:0},{name:'Pooja',score:0},
  {name:'Aneeqa',score:0},{name:'Rajoudi',score:0},{name:'Osama',score:0},{name:'Hisham',score:0},{name:'Synthia',score:0},
];
const TEAMS_KEY = 'quest-players-v1';

async function loadTeamsFromStorage(){
  try{
    const data = await fbGet(TEAMS_KEY);
    if(data){ teams = data; return; }
  }catch(e){ /* fall through to defaults below */ }
  await saveTeamsToStorage();
}
function showToast(msg, duration=4500){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._hideTimer);
  t._hideTimer = setTimeout(()=>t.classList.remove('show'), duration);
}
function retrySharedSave(key, value, label, attempt=1){
  if(attempt > 5){
    showToast(`Couldn't sync ${label} to other screens right now — this screen is still correct, and it'll keep trying quietly.`);
    return;
  }
  setTimeout(async ()=>{
    try{ await fbSet(key, value); }
    catch(e){ retrySharedSave(key, value, label, attempt+1); }
  }, 500*attempt);
}

async function saveTeamsToStorage(){
  try{ await fbSet(TEAMS_KEY, teams); }
  catch(e){ retrySharedSave(TEAMS_KEY, teams, 'scores'); }
}

function renderLeaderboard(){
  const rows = document.getElementById('lbRows');
  const sorted = teams.map((t,i)=>({...t,i})).sort((a,b)=>b.score-a.score);
  rows.innerHTML = sorted.map(t=>`<div class="lb-row"><span><span class="lb-swatch" style="background:${rosterColors[t.i % rosterColors.length]}"></span>${t.name}</span><span class="mono">${t.score}</span></div>`).join('');
}
async function addPoints(i,pts){
  teams[i].score += pts;
  refreshAllTeamUI();
  if(pts>0) burstSmall();
  await saveTeamsToStorage();
}

/* ---- Spot the Spark: one attempt per person, persisted ---- */
const SPARK_PLAYED_KEY = 'quest-spark-played-v2';
let sparkPlayed = [];
async function loadSparkPlayed(){
  try{
    const data = await fbGet(SPARK_PLAYED_KEY);
    if(data){ sparkPlayed = data; return; }
  }catch(e){ /* not created yet */ }
  await saveSparkPlayed();
}
async function saveSparkPlayed(){
  try{ await fbSet(SPARK_PLAYED_KEY, sparkPlayed); }
  catch(e){ retrySharedSave(SPARK_PLAYED_KEY, sparkPlayed, 'spark round results'); }
}
function renderSparkTeamSelect(){
  const sel = document.getElementById('sparkTeamSelect');
  if(!sel) return;
  const prevVal = sel.value;
  sel.innerHTML = teams.map((t,i)=>{
    const played = sparkPlayed.includes(i);
    return `<option value="${i}" ${played?'disabled':''}>${t.name}${played?' — already played':''}</option>`;
  }).join('');
  const stillValid = Array.from(sel.options).some(o=>o.value===prevVal && !o.disabled);
  if(stillValid) sel.value = prevVal;
}
function renderSparkStatus(){
  const card = document.getElementById('sparkStatusCard');
  if(!card) return;
  card.innerHTML = '<label class="field-label">Who\'s Played</label>' + teams.map((t,i)=>
    `<div class="lb-row"><span>${t.name}</span><span class="mono" style="color:${sparkPlayed.includes(i)?'var(--teal)':'var(--chalk-dim)'}">${sparkPlayed.includes(i)?'✔ played':'— not yet'}</span></div>`
  ).join('');
}
/* ---- Check-in: each teacher taps their own name to say they're here ---- */
const CHECKIN_KEY = 'quest-checkin-v1';
let checkedIn = [];
async function loadCheckedIn(){
  try{
    const data = await fbGet(CHECKIN_KEY);
    if(data){ checkedIn = data; return; }
  }catch(e){ /* not created yet */ }
  await saveCheckedIn();
}
async function saveCheckedIn(){
  try{ await fbSet(CHECKIN_KEY, checkedIn); }
  catch(e){ retrySharedSave(CHECKIN_KEY, checkedIn, 'check-ins'); }
}
async function toggleCheckin(i){
  const idx = checkedIn.indexOf(i);
  if(idx>=0) checkedIn.splice(idx,1); else checkedIn.push(i);
  renderRoster();
  await saveCheckedIn();
}
function renderRoster(){
  const wrap = document.getElementById('rosterWrap');
  if(!wrap) return;
  wrap.innerHTML = teams.map((t,i)=>{
    const here = checkedIn.includes(i);
    return `<div class="roster-chip ${here?'here':''}" onclick="toggleCheckin(${i})">${here?'✓ ':''}${t.name}</div>`;
  }).join('');
}

function refreshAllTeamUI(){
  renderLeaderboard();
  renderAwardPanels();
  renderSparkTeamSelect();
  renderSparkStatus();
  renderRoster();
  renderGuessWhoSelect();
  renderInlineBoard('guessWhoBoard', false);
  renderInlineBoard('finalBoard', true);
}

async function pollTeamsFromStorage(){
  try{
    const data = await fbGet(TEAMS_KEY);
    if(data) teams = data;
  }catch(e){ /* ignore transient errors */ }
  try{
    const data2 = await fbGet(SPARK_PLAYED_KEY);
    if(data2) sparkPlayed = data2;
  }catch(e){ /* ignore transient errors */ }
  try{
    const data3 = await fbGet(CHECKIN_KEY);
    if(data3) checkedIn = data3;
  }catch(e){ /* ignore transient errors */ }
  refreshAllTeamUI();
}
document.getElementById('lbToggle').addEventListener('click',(e)=>{
  const lb=document.getElementById('leaderboard'); const hidden=lb.style.display==='none';
  lb.style.display = hidden?'block':'none'; e.target.textContent = hidden?'HIDE SCORES':'SHOW SCORES';
});
function awardPanel(label){
  let html = `<div class="award-panel"><h4>${label}</h4><div class="award-grid">`;
  teams.forEach((t,i)=>{
    html += `<div class="award-btn"><div style="font-weight:700; font-size:.9rem; text-align:center; padding:4px 0;">${t.name}</div><div class="plus-row"><button class="plus" onclick="addPoints(${i},1)">+1</button><button class="plus" onclick="addPoints(${i},3)">+3</button><button class="plus" onclick="addPoints(${i},5)">+5</button></div></div>`;
  });
  html += `</div></div>`;
  return html;
}
function awardPanelMount(label){
  return `<div class="award-mount" data-label="${label}"></div>`;
}
function renderAwardPanels(){
  document.querySelectorAll('.award-mount').forEach(el=>{
    el.innerHTML = awardPanel(el.dataset.label);
  });
}

/* ============ CONFETTI (self-contained) ============ */
const confettiCanvas = document.getElementById('confetti-canvas');
const cctx = confettiCanvas.getContext('2d');
function resizeConfettiCanvas(){ confettiCanvas.width = window.innerWidth; confettiCanvas.height = window.innerHeight; }
resizeConfettiCanvas(); window.addEventListener('resize', resizeConfettiCanvas);
let confettiParticles = [], confettiRAF = null;
function spawnParticles(count, ox, oy, colors, spread, baseAngle, speed){
  const originX = ox*confettiCanvas.width, originY = oy*confettiCanvas.height;
  for(let i=0;i<count;i++){
    const angle = (baseAngle + (Math.random()-0.5)*spread) * Math.PI/180;
    const v = speed*(0.6+Math.random()*0.8);
    confettiParticles.push({x:originX,y:originY,vx:Math.cos(angle)*v,vy:-Math.sin(angle)*v,size:4+Math.random()*5,color:colors[Math.floor(Math.random()*colors.length)],rot:Math.random()*360,vrot:(Math.random()-0.5)*14,life:0,maxLife:70+Math.random()*40});
  }
  if(!confettiRAF) confettiRAF = requestAnimationFrame(tickConfetti);
}
function tickConfetti(){
  cctx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height);
  confettiParticles.forEach(p=>{
    p.vy+=0.35; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vrot; p.life++;
    cctx.save(); cctx.translate(p.x,p.y); cctx.rotate(p.rot*Math.PI/180);
    cctx.globalAlpha=Math.max(0,1-p.life/p.maxLife); cctx.fillStyle=p.color;
    cctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6); cctx.restore();
  });
  confettiParticles = confettiParticles.filter(p=>p.life<p.maxLife && p.y<confettiCanvas.height+40);
  if(confettiParticles.length>0) confettiRAF = requestAnimationFrame(tickConfetti);
  else{ cctx.clearRect(0,0,confettiCanvas.width,confettiCanvas.height); confettiRAF=null; }
}
function burstSmall(){ spawnParticles(28,0.9,0.15,['#FFC857','#4FA8A0','#E4572E'],55,250,11); }
function burstBig(){
  let n=0; const iv=setInterval(()=>{
    spawnParticles(10,0,0.6,['#FFC857','#4FA8A0','#E4572E','#9B8AE6'],60,30,13);
    spawnParticles(10,1,0.6,['#FFC857','#4FA8A0','#E4572E','#9B8AE6'],60,150,13);
    n++; if(n>=14) clearInterval(iv);
  },160);
}

/* ============ GENERIC TIMER ============ */
let timerInterval = null;
function formatTime(s){ const m=Math.floor(s/60), sec=s%60; return `${m}:${sec.toString().padStart(2,'0')}`; }
function startTimer(seconds, dispId, btnId, onDone){
  clearInterval(timerInterval);
  let remaining = seconds;
  const disp = document.getElementById(dispId), btn = document.getElementById(btnId);
  disp.classList.remove('done'); disp.textContent = formatTime(remaining);
  if(btn){ btn.textContent='Pause'; btn.onclick = ()=>{ clearInterval(timerInterval); btn.textContent='Resume'; btn.onclick=()=>startTimer(remaining,dispId,btnId,onDone); }; }
  timerInterval = setInterval(()=>{
    remaining--; disp.textContent = formatTime(Math.max(remaining,0));
    if(remaining<=0){ clearInterval(timerInterval); disp.classList.add('done'); disp.textContent="TIME'S UP"; if(onDone) onDone(); }
  },1000);
}
function resetTimer(seconds, dispId){ clearInterval(timerInterval); const disp=document.getElementById(dispId); disp.classList.remove('done'); disp.textContent=formatTime(seconds); }
function toggleReveal(id){ document.getElementById(id).classList.toggle('open'); }
async function checkGuessQuiz(el){
  const card = el.closest('.card');
  const opts = card.querySelectorAll('.quiz-opt');
  opts.forEach(o=>o.style.pointerEvents='none');
  const isCorrect = el.dataset.correct === 'true';
  el.classList.add(isCorrect ? 'correct' : 'wrong');
  if(!isCorrect){ opts.forEach(o=>{ if(o.dataset.correct==='true') o.classList.add('correct'); }); }
  else{
    const sel = document.getElementById('guessWhoSelect');
    const idx = sel ? parseInt(sel.value) : NaN;
    if(!isNaN(idx)) await addPoints(idx, 2);
    else burstSmall();
  }
}
function renderGuessWhoSelect(){
  const sel = document.getElementById('guessWhoSelect');
  if(!sel) return;
  const prevVal = sel.value;
  sel.innerHTML = teams.map((t,i)=>`<option value="${i}">${t.name}</option>`).join('');
  if(Array.from(sel.options).some(o=>o.value===prevVal)) sel.value = prevVal;

let current = 0;
function goTo(i){
  if(i<0||i>=slides.length) return;
  document.querySelectorAll('.slide').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.dot').forEach(d=>d.classList.remove('active'));
  deck.children[i].classList.add('active');
  dotsWrap.children[i].classList.add('active');
  document.getElementById('slideCounter').textContent = `${String(i+1).padStart(2,'0')} / ${slides.length}`;
  current = i;
  refreshAllTeamUI();
  if(i === 2) attachPlanSandbox();
  if(i === 3) attachWorksheetSandbox();
  if(i === 4) attachGameIdeaSandbox();
}
function renderInlineBoard(elId, big){
  const el = document.getElementById(elId);

  const sorted = [...teams].sort((a,b)=>b.score-a.score);
  el.innerHTML = sorted.map((t,rank)=>`<div style="display:flex; justify-content:space-between; align-items:center; padding:${big?'11px':'7px'} 0; border-bottom:1px solid var(--line); font-size:${big?'1.1rem':'.9rem'};"><span>${rank===0?'🏆 ':''}${t.name}</span><span class="mono" style="color:var(--marker); font-weight:700;">${t.score} pts</span></div>`).join('');
}

document.getElementById('prevBtn').addEventListener('click',()=>goTo(current-1));

/* ============================================================
   SPOT THE SPARK GAME
   ============================================================ */
let sparkScore = 0, sparkSpawnInterval = null;
const distractors = [
  {cls:'d1', emoji:'🤖'}, {cls:'d2', emoji:'💬'}, {cls:'d3', emoji:'🧠'},
];
function spawnIcon(){
  const arena = document.getElementById('gameArena');
  if(!arena) return;
  const isClaude = Math.random() < 0.4;
  const icon = document.createElement('div');
  const w = arena.clientWidth, h = arena.clientHeight;
  const x = Math.random()*(w-64), y = Math.random()*(h-64);
  icon.style.left = x+'px'; icon.style.top = y+'px';
  if(isClaude){
    icon.className = 'game-icon claude';
    icon.innerHTML = '✳';
  } else {
    const d = distractors[Math.floor(Math.random()*distractors.length)];
    icon.className = 'game-icon '+d.cls;
    icon.innerHTML = d.emoji;
  }
  icon.addEventListener('click', (e)=>{
    e.stopPropagation();
    if(isClaude){ sparkScore += 1; showFlash(arena, x, y, '+1', '#4FA8A0'); }
    else{ sparkScore = Math.max(0, sparkScore-1); showFlash(arena, x, y, '-1', '#E4572E'); }
    document.getElementById('gameScore').textContent = 'Score: '+sparkScore;
    icon.remove();
  });
  arena.appendChild(icon);
  setTimeout(()=>{ if(icon.parentNode) icon.remove(); }, 1000);
}
function showFlash(arena, x, y, text, color){
  const f = document.createElement('div');
  f.className='flash'; f.textContent=text; f.style.color=color;
  f.style.left=(x+15)+'px'; f.style.top=y+'px';
  arena.appendChild(f);
  setTimeout(()=>f.remove(), 650);
}
function startSparkGame(){
  const sel = document.getElementById('sparkTeamSelect');
  const idx = parseInt(sel.value);
  if(isNaN(idx)){ alert('Choose a person first.'); return; }
  if(sparkPlayed.includes(idx)){ alert('This person has already had their one attempt.'); return; }
  sparkScore = 0;
  document.getElementById('gameScore').textContent = 'Score: 0';
  document.getElementById('gameArena').innerHTML = '';
  clearInterval(sparkSpawnInterval);
  sel.disabled = true;
  sparkSpawnInterval = setInterval(spawnIcon, 550);
  startTimer(20, 'gameTimer', 'gameStartBtn', async ()=>{
    clearInterval(sparkSpawnInterval);
    document.getElementById('gameArena').innerHTML = '';
    sparkPlayed.push(idx);
    await saveSparkPlayed();
    await addPoints(idx, sparkScore);
    const btn = document.getElementById('gameStartBtn');
    btn.textContent = 'Start Round';
    btn.onclick = ()=>startSparkGame();
    sel.disabled = false;
  });
}
function resetSparkGame(){
  clearInterval(sparkSpawnInterval);
  sparkScore = 0;
  document.getElementById('gameScore').textContent = 'Score: 0';
  document.getElementById('gameArena').innerHTML = '';
  resetTimer(20,'gameTimer');
  const sel = document.getElementById('sparkTeamSelect');
  if(sel) sel.disabled = false;
  const btn = document.getElementById('gameStartBtn');
  btn.textContent = 'Start Round';
  btn.onclick = ()=>startSparkGame();
}

function attachPlanSandbox(){
  const btn = document.getElementById('planGenBtn');
  if(btn.dataset.bound) return; btn.dataset.bound='1';
  btn.addEventListener('click', ()=>{
    const oldPlan = document.getElementById('planOld').value.trim();
    const newTopic = document.getElementById('planNew').value.trim();
    const out = document.getElementById('planOutput');
    const actions = document.getElementById('planActions');
    if(!oldPlan || !newTopic){ alert('Fill in both boxes first.'); return; }
    const prompt = `Here is my existing lesson plan, formatted exactly how I want to keep it:\n${oldPlan}\n\nI'm now teaching this instead:\n${newTopic}\n\nUpdate the plan for the new topic and KPIs. Keep the exact same structure, headings, section order, and formatting style as the original. Only change what needs to change: the topic content, examples, questions, and objectives — not the layout.`;
    out.classList.add('show'); out.textContent = prompt;
    actions.style.display = 'flex';
  });
}
